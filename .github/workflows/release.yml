name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release (macOS ARM64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download dependencies
        run: go mod download
        env:
          GOPROXY: https://proxy.golang.org,direct
          GOSUMDB: sum.golang.org

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION_NO_V=${VERSION#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_NO_V=$VERSION_NO_V" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          echo "Version no v: $VERSION_NO_V"

      - name: Build binary
        env:
          GOOS: darwin
          GOARCH: arm64
          VERSION: ${{ steps.version.outputs.VERSION }}
          VERSION_NO_V: ${{ steps.version.outputs.VERSION_NO_V }}
          COMMIT: ${{ github.sha }}
          BUILD_TIME: ${{ github.event.head_commit.timestamp }}
        run: |
          set -x
          echo "Building for macOS ARM64..."
          echo "VERSION: $VERSION"
          echo "VERSION_NO_V: $VERSION_NO_V"

          OUTPUT_NAME="cc-connect-${VERSION_NO_V}-${GOOS}-${GOARCH}"

          LDFLAGS="-s -w \
            -X main.version=${VERSION} \
            -X main.commit=${COMMIT} \
            -X main.buildTime=${BUILD_TIME}"

          go build -ldflags "$LDFLAGS" -o "$OUTPUT_NAME" ./cmd/cc-connect
          ls -la "$OUTPUT_NAME"

          # 打包
          tar czf "${OUTPUT_NAME}.tar.gz" "$OUTPUT_NAME"
          ls -la "${OUTPUT_NAME}.tar.gz"

      - name: Check files before upload
        run: |
          echo "=== Files in current directory ==="
          ls -la
          echo "=== Tar.gz files ==="
          ls -la *.tar.gz || echo "No tar.gz files found"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: |
            cc-connect-*.*.tar.gz
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
