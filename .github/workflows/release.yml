name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # 触发条件：推送 v1.0.0, v2.1.3-beta.1 等格式的 tag

permissions:
  contents: write  # 需要写入权限来创建 Release

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download dependencies
        run: go mod download
        env:
          GOPROXY: https://proxy.golang.org,direct
          GOSUMDB: sum.golang.org

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          COMMIT: ${{ github.sha }}
          BUILD_TIME: ${{ github.event.head_commit.timestamp }}
        run: |
          BASE_NAME="cc-connect-${VERSION#"v"}-${GOOS}-${GOARCH}"
          OUTPUT_NAME="$BASE_NAME"
          if [ "$GOOS" = "windows" ]; then
            OUTPUT_NAME="${BASE_NAME}.exe"
          fi

          LDFLAGS="-s -w \
            -X main.version=${VERSION} \
            -X main.commit=${COMMIT} \
            -X main.buildTime=${BUILD_TIME}"

          go build -ldflags "$LDFLAGS" -o "$OUTPUT_NAME" ./cmd/cc-connect

          # 打包
          if [ "$GOOS" = "windows" ]; then
            zip "${BASE_NAME}.zip" "$OUTPUT_NAME"
          else
            tar czf "${BASE_NAME}.tar.gz" "$OUTPUT_NAME"
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cc-connect-*.*.tar.gz
            cc-connect-*.*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
