# =============================================================================
# Multi-Workspace Mode / 多工作区模式 (optional / 可选)
# =============================================================================
# Allows one project to dynamically switch between multiple workspaces (Git repos)
# via /ws add <git_url>, /ws list, /ws switch, etc.
# 允许一个项目通过 /ws add <git_url>、/ws list、/ws switch 等命令
# 动态管理多个工作区（Git 仓库）。
#
# When mode = "multi-workspace":
# 当 mode = "multi-workspace" 时：
# - base_dir is required / 必须设置 base_dir
# - A root work_dir is NOT used / 不再使用固定根 work_dir
# - /ws add <git_url> clones repos under base_dir / `/ws add <git_url>` 会将仓库克隆到 base_dir 下
# - Messages are routed to the current workspace / 消息会路由到当前工作区
#
# Supported workspace commands / 支持的工作区命令：
# - /ws add <git_url> [name]      Clone and register a repo / 克隆并注册仓库
# - /ws list                      Show all workspaces / 列出所有工作区
# - /ws switch <name|index>       Switch current workspace / 切换当前工作区
# - /ws current                   Show current workspace / 查看当前工作区
# - /ws pull [name]               Git pull current or named workspace / 拉取更新
# - /ws remove <name> [--delete]  Remove workspace (optionally delete files) / 移除工作区（可选删除文件）
# - /ws attach <path> [name]      Register an existing local directory / 注册已存在的本地目录
# - /ws rename <old> <new>        Rename a workspace / 重命名工作区
#
# [[projects]]
# name = "multi-repo"
# mode = "multi-workspace"
# base_dir = "/path/to/workspaces"
# admin_from = "123456789"  # Optional: who can run privileged commands / 可选：谁可执行特权命令
#
# [projects.agent]
# type = "claudecode"
#
# [projects.agent.options]
# mode = "default"
# # Optional: provider/model / 可选：模型与 Provider
# # model = "sonnet"
#
# [[projects.platforms]]
# type = "telegram"
#
# [projects.platforms.options]
# token = "your-telegram-bot-token"
# allow_from = "*"

# =============================================================================
# Project: Using Cursor Agent / 项目：使用 Cursor Agent (uncomment to enable / 取消注释以启用)
# =============================================================================
# Requires: Cursor Agent installed (`cursor-agent` or `agent` in PATH)
# 需要：已安装 Cursor Agent（`cursor-agent` 或 `agent` 命令在 PATH 中）
# Connection: spawned CLI subprocess / 连接方式：启动本地 CLI 子进程
#
# Notes / 说明：
# - You can override the binary via `cmd = "agent"` if your installation exposes
#   the Cursor Agent CLI under a different name.
#   如果你的安装将 Cursor Agent CLI 暴露为其它命令名，可用 `cmd = "agent"` 覆盖。
# - Supports provider switching using env vars on each provider entry.
#   支持通过各 provider 的 env 字段切换后端。
# - Optional auth_method: "cursor_login" auto-maps to
#   `api-key-cursor-login`, which opens browser/device login when needed.
#   可选 auth_method: "cursor_login" 会自动映射为 `api-key-cursor-login`，
#   在需要时触发浏览器/设备登录。
#
# [[projects]]
# name = "my-cursor-project"
#
# [projects.agent]
# type = "cursor"
#
# [projects.agent.options]
# work_dir = "/path/to/project"
# mode = "default"  # "default" | "force" | "plan" | "ask"
# cmd = "cursor-agent"  # optional CLI binary name / 可选 CLI 二进制名称
# auth_method = "cursor_login" # optional auth flow alias / 可选认证方式（映射到 api-key-cursor-login）
# timeout_mins = 30  # Per-turn timeout in minutes; 0 = disabled / 每次对话超时时间（分钟），0 表示不限制
#
# Mode options / 模式说明:
# - "default": Trust workspace, ask before tool use / 信任工作区，工具调用前询问
# - "force":   Auto-approve all tool calls (same as --force/--yolo) / 自动批准所有工具调用
# - "plan":    Read-only analysis, no edits / 只读分析，不做修改
# - "ask":     Q&A style, read-only / 问答风格，只读
#
# Optional: specify a model / 可选：指定模型
# model = "claude-sonnet-4-20250514"
#
# [[projects.platforms]]
# type = "feishu"
#
# [projects.platforms.options]
# app_id = "your-feishu-app-id"
# app_secret = "your-feishu-app-secret"

